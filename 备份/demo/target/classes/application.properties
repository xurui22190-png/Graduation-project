spring.application.name=demo
server.port=9192

# MySQL 数据库配置
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/grade-management?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.demo.model
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 日志级别
logging.level.com.demo.mapper=DEBUG
logging.level.org.apache.ibatis=DEBUG

# 解决 Bean 序列化为空的报错
spring.jackson.serialization.fail-on-empty-beans=false

# 解决 Spring Boot 2.6.x 以上版本与 Swagger 的路径匹配冲突
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# 文件上传路径
web.upload-path=D:/Graduation project/upload/

# 静态资源映射
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/

# ==========================================
# 🌟 新增：Redis 缓存配置
# ==========================================
spring.redis.host=127.0.0.1
spring.redis.port=6379

spring.redis.password=
# 使用 0 号数据库
spring.redis.database=0
# Lettuce 连接池配置
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0